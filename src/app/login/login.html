<div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">

          <div class="text-center mb-4">
            <h2 class="fw-bold">Welcome Back</h2>
            <p class="text-muted">Sign in to your account</p>
          </div>

          <form>

            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input
                type="email" [(ngModel)] = "userObj.email" name="email"
                class="form-control form-control-lg"
                placeholder="Enter your email">
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input
                type="password" [(ngModel)] = "userObj.password" name="password"
                class="form-control form-control-lg"
                placeholder="Enter your password">
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="rememberMe">

                <label class="form-check-label" for="rememberMe">
                  Remember me
                </label>
              </div>

              <a href="#" class="text-decoration-none">
                Forgot Password?
              </a>
            </div>

            <div class="d-grid">
              <button type="submit" (click)="onLoginUser()" class="btn btn-primary btn-lg">
                Login
              </button>
            </div>

          </form>

          <hr class="my-4">

          <div class="text-center">
            <span class="text-muted">Don't have an account?</span>
            <a href="#" class="text-decoration-none fw-semibold ms-1">
              Register
            </a>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
