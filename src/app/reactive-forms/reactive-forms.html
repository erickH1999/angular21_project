<form class="container mt-4" [formGroup]="empForm">
    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" formControlName="name" id="name" placeholder="Enter employee name">

        <div class="div">
            @if(empForm.controls['name'].touched ||
            empForm.controls['name'].dirty) {
            @if(
            empForm.controls['name'].errors?.['required']
            ) {
            <span>This is required</span>
            }
            @if(
            empForm.controls['name'].errors?.['minlength']
            ) {
            <span>Name must be at least 4 characters long</span>
            }
            }
        </div>



    </div>

    <div class="mb-3">
        <label for="role" class="form-label">Role</label>
        <select class="form-select" id="role" formControlName="role">
            <option selected disabled>Select Role</option>
            <option>Manager</option>
            <option>Developer</option>
            <option>Tester</option>
            <option>Analyst</option>
        </select>
    </div>

    <div class="mb-3">
        <label for="department" class="form-label">Department</label>
        <select class="form-select" id="department" formControlName="Department">
            <option selected disabled>Select Department</option>
            <option>HR</option>
            <option>IT</option>
            <option>Finance</option>
            <option>Operations</option>
        </select>
    </div>

    <div class="mb-3">
        <label for="salary" class="form-label">Salary</label>
        <input type="number" class="form-control" id="salary" formControlName="salary" placeholder="Enter salary">
    </div>

    <div class="mb-3">
        <label class="form-label d-block">Employment Type</label>

        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="employmentType" id="fullTime" value="Full Time">
            <label class="form-check-label" for="fullTime">Full Time</label>
        </div>

        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="employmentType" id="partTime" value="Part Time">
            <label class="form-check-label" for="partTime">Part Time</label>
        </div>
    </div>

    <button type="submit" [disabled]="empForm.invalid" class="btn btn-primary">Submit</button>
</form>
