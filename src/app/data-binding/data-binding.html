<div class="container">
  <div class="card">
    <h2>Angular Data Binding Demo</h2>

    <div class="section">
      <label>Department Name</label>
      <h3>{{ deptname }}</h3>

      <input
        type="text"
        [(ngModel)]="deptname"
        placeholder="Enter department name"
      />
    </div>

    <div class="section">
      <label>One-Way Binding Example</label>
      <input [type]="inputType" placeholder="Dynamic input type" />
    </div>

    <div class="section">
      <p [class]="className">
        Angular Data Binding
      </p>
    </div>

    <div class="button-group">
      <button (click)="showMessage()">
        Show Message
      </button>
    </div>

    <div class="section">
      <label>Select City</label>

      <select (change)="changeCity()">
        <option>Austin</option>
        <option>Denver</option>
        <option>New York</option>
      </select>
    </div>
  </div>
</div>
